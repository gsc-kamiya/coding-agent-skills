name: Deploy to GitHub Pages

# Generic GitHub Pages deploy workflow for static-site frameworks
# (Astro / Nuxt / Next / Vite / Hugo / Jekyll / etc.).
#
# Default below is Astro. Swap the BUILD step and artifact path for other frameworks.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - run: npm ci

      # ---------------------------------------------------------------------
      # Optional: fetch external data at build time (RSS, headless CMS, etc.)
      #
      # - name: Fetch RSS feed
      #   run: node scripts/fetch-rss.mjs
      # ---------------------------------------------------------------------

      # ---------------------------------------------------------------------
      # BUILD — swap the command for your framework:
      #
      # Astro:   npx astro build      (output: dist)          ← default
      # Nuxt:    npx nuxt generate    (output: .output/public)
      # Next:    npx next build && npx next export    (output: out)
      # Vite:    npm run build        (output: dist)
      # Hugo:    hugo --minify        (output: public)
      # Jekyll:  bundle exec jekyll build    (output: _site)
      # ---------------------------------------------------------------------
      - name: Build
        run: npx astro build

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
